name: Demonstrating secrets and variables
on:
  workflow_dispatch:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Application Name
        run: echo "${{ vars.APP_NAME }}"

      - name: App password
        run: echo "${{ secrets.APP_PASSWORD }}"

      - name: Database name
        run: echo "${{ vars.DB_NAME }}"

      - name: DB password
        run: echo "${{ secrets.DB_PASSWORD }}"
